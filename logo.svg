<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" width="220" height="60">
  <defs>
    <!-- Main gradient - orange to red like PW mixed with Testbook blue -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B00"/>
      <stop offset="50%" style="stop-color:#FF3D00"/>
      <stop offset="100%" style="stop-color:#C00080"/>
    </linearGradient>
    <!-- Text gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a1d2e"/>
      <stop offset="100%" style="stop-color:#2d1f6e"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Icon shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#FF3D00" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Icon background — rounded square like Testbook/PW style -->
  <rect x="2" y="4" width="48" height="48" rx="13" fill="url(#iconGrad)" filter="url(#shadow)"/>

  <!-- Inner shine overlay -->
  <rect x="2" y="4" width="48" height="24" rx="13" fill="white" opacity="0.08"/>

  <!-- Target/Bullseye icon — CrackIt theme -->
  <!-- Outer ring -->
  <circle cx="26" cy="28" r="16" fill="none" stroke="white" stroke-width="2.2" opacity="0.3"/>
  <!-- Middle ring -->
  <circle cx="26" cy="28" r="10" fill="none" stroke="white" stroke-width="2.5" opacity="0.6"/>
  <!-- Inner ring -->
  <circle cx="26" cy="28" r="5" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
  <!-- Bullseye center dot -->
  <circle cx="26" cy="28" r="2.5" fill="white"/>

  <!-- Arrow piercing through — dynamic feel -->
  <line x1="8" y1="46" x2="32" y2="22" stroke="white" stroke-width="2.8" stroke-linecap="round" filter="url(#glow)"/>
  <!-- Arrow head -->
  <polygon points="32,22 25,23 31,29" fill="white"/>

  <!-- "C" letter subtle watermark on icon -->
  <!-- <text x="18" y="33" font-family="Arial Black" font-size="18" fill="white" opacity="0.12" font-weight="900">C</text> -->

  <!-- CRACKIT text -->
  <text x="60" y="33" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="22" font-weight="900" fill="url(#textGrad)" letter-spacing="1.5">
    CRACK
  </text>

  <!-- IT in gradient orange -->
  <text x="143" y="33" font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="22" font-weight="900" letter-spacing="1.5">
    <tspan fill="url(#iconGrad)">IT</tspan>
  </text>

  <!-- Tagline -->
  <text x="61" y="46" font-family="'Arial', sans-serif"
    font-size="8.5" fill="#6b7280" letter-spacing="2.5" font-weight="500">
    CRACK EVERY EXAM
  </text>

  <!-- Small accent dot between CRACK and IT -->
  <circle cx="139" cy="27" r="2.5" fill="url(#iconGrad)"/>

</svg>
